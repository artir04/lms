# All-in-one: PostgreSQL + backend API + frontend SPA in a single container.
# No env vars required — baked-in defaults work out of the box.
# Route your domain to port 8000 via Dokploy's Traefik.
# Data persists in the app_data and media_files volumes.

services:
  app:
    image: ghcr.io/artir04/lms/app:latest
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
    volumes:
      - app_data:/var/lib/postgresql/data
      - media_files:/app/media
    mem_limit: 768m
    restart: unless-stopped

volumes:
  app_data:
  media_files:
