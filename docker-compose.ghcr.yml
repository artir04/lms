# Deploy via Dokploy on Orange Pi Zero 4 (RK3399, 4GB RAM).
# Import this file in Dokploy, override env vars in the UI, and route a domain
# to the frontend service (port 80) via Traefik.
# Images are published by .github/workflows/docker-publish.yml.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    restart: unless-stopped

  backend:
    image: ghcr.io/artir04/lms/backend:latest
    environment:
      APP_ENV: production
      APP_NAME: LMS Platform
      SECRET_KEY: change-this-to-a-long-random-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DATABASE_URL: postgresql+asyncpg://lms_user:lms_password@db:5432/lms_db
      STORAGE_BACKEND: local
      MEDIA_ROOT: /app/media
      EMAIL_BACKEND: console
      DEFAULT_FROM_EMAIL: noreply@lms.example.com
      FRONTEND_URL: /
      SUPERADMIN_EMAIL: superadmin@lms.example.com
      SUPERADMIN_PASSWORD: SuperAdmin123!
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_files:/app/media
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 512m
    restart: unless-stopped

  frontend:
    image: ghcr.io/artir04/lms/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    mem_limit: 128m
    restart: unless-stopped

volumes:
  postgres_data:
  media_files:
