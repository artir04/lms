# Presentation deployment for Orange Pi Zero 4 (4GB RAM)
# Dokploy: deploy as file, Traefik routes generated domain to frontend:80
# Includes automatic seeder to populate database on startup

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.lite
    environment:
      APP_ENV: production
      APP_NAME: LMS Platform
      SECRET_KEY: change-this-to-a-long-random-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DATABASE_URL: postgresql+asyncpg://lms_user:lms_password@db:5432/lms_db
      STORAGE_BACKEND: local
      MEDIA_ROOT: /app/media
      EMAIL_BACKEND: console
      DEFAULT_FROM_EMAIL: noreply@lms.example.com
      FRONTEND_URL: /  # relative — works behind any domain via nginx proxy
      SUPERADMIN_EMAIL: superadmin@lms.example.com
      SUPERADMIN_PASSWORD: SuperAdmin123!
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_files:/app/media
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 512m
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.lite
    ports:
      - "80:80"
    depends_on:
      - backend
    mem_limit: 128m
    restart: unless-stopped

  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile.lite
    env_file:
      - ./backend/.env
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - media_files:/app/media
    command: python -m app.db.seed
    restart: "no"
    mem_limit: 256m

volumes:
  postgres_data:
  media_files: